name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/chinesemath-backend
            git pull origin main
            echo DATABASE_URL="${{ secrets.DATABASE_URL }}" > .env
            echo JWT_SECRET="${{ secrets.JWT_SECRET }}" >> .env
            docker compose down --remove-orphans -v --timeout 30 || true
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker system prune -f
            sleep 3
            docker compose up -d --build
            sleep 30
            docker logs chinesemath-backend-backend-1
            curl -sf http://localhost:4000/api/health || exit 1
            # Debug: Check if backend is accessible
            echo "Checking backend accessibility..."
            docker ps | grep chinesemath-backend
            netstat -tlnp | grep 4000 || ss -tlnp | grep 4000
            curl -v http://localhost:4000/api/health
            cd /opt/chinesemath-frontend
            git pull origin main
            # Remove all conflicting nginx configs
            sudo rm -f /etc/nginx/sites-enabled/examroomedu /etc/nginx/sites-available/examroomedu
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo cp nginx.conf /etc/nginx/sites-available/examroomedu
            sudo ln -sf /etc/nginx/sites-available/examroomedu /etc/nginx/sites-enabled/examroomedu
            sudo nginx -t && sudo systemctl restart nginx
            # Debug: Check nginx status
            echo "Checking nginx status..."
            sudo systemctl status nginx --no-pager
            sudo tail -20 /var/log/nginx/error.log
